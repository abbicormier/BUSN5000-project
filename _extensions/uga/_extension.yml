title: "UGA Style Guide"
author: "Chris Cornwell"
version: "2.0.0"
quarto-required: ">=1.4.0"
contributes:
  formats:
    common:
      execute:
        echo: false
        warning: false
        message: false
      knitr:
        opts_chunk:
          fig.align: center
          fig.retina: 2
    pdf:
      documentclass: article
      papersize: letter
      geometry: margin=1in
      fontsize: 11pt
      toc: true
      toc-depth: 3
      number-sections: true
      fig-cap-location: bottom
      pdf-engine: xelatex
      keep-tex: false
      include-in-header:
        - uga-doc.tex
      knitr:
        opts_chunk:
          out.width: "85%"
          fig.width: 6
          fig.height: 4
    beamer:
      theme: Boadilla
      colortheme: default
      aspectratio: 169
      section-titles: true
      toc: false
      slide-level: 2
      pdf-engine: pdflatex
      keep-tex: false
      include-in-header:
        - beamerthemeUGA.sty
        - uga-tikz.tex
      knitr:
        opts_chunk:
          out.width: "85%"
    revealjs:
      theme:
        - default
        - uga.scss
      slide-number: false
      transition: fade
      transition-speed: fast
      width: 1600
      height: 900
      margin: 0.08
      center: false
      hash: true
      history: true
      controls: true
      progress: true
      include-after-body:
        - uga-footer.html
